name: Build Development

on:
  push:
    branches: [ "development" ]
  pull_request:
    branches: [ "development" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build with Gradle
      run: |
        chmod +x gradlew
        ./gradlew build shadowJar

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vortexia-core-dev
        path: build/libs/*.jar

    - name: Update Dev-Snapshot Tag
      if: github.event_name == 'push' && github.ref == 'refs/heads/development'
      run: |
        git tag -f Dev-Snapshot
        git push origin Dev-Snapshot --force
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create/Update Dev Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/development'
      uses: ncipollo/release-action@v1
      with:
        artifacts: "build/libs/*.jar"
        tag: "Dev-Snapshot"
        name: "Development Snapshot"
        allowUpdates: true
        replacesArtifacts: true
        prerelease: true
        makeLatest: false
        body: "Automated snapshot build from development branch. Always reflects the latest commit."
        token: ${{ secrets.GITHUB_TOKEN }}
